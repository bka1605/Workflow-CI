name: Model Training Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          cd "Membangun_model"
          pip install -r requirements.txt

      - name: Run mlflow project
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run:
          cd "Membangun_model"
          python modelling_tuning.py
          
      - name: Get latest MLflow run_id
        run: echo "Run ID otomatis terekam oleh DagsHub tracking URI"

      - name: Install Python dependencies
        run: echo "Dependencies sudah terinstall di tahap sebelumnya"

      # Catatan di gambar menyebutkan "Sesuaikan dengan metode penyimpanan yang Anda pilih"
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: hasil-artefak-model
          path: .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model
        run: |
          ls -R
          cd "Monitoring dan Logging"
          docker build -t ${{ secrets.DOCKER_USERNAME }}/iris-api:latest .

      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/iris-api:latest ${{ secrets.DOCKER_USERNAME }}/iris-api:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-api:latest