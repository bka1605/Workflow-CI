name: Model Training CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run mlflow project
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          cd MLProject
          mlflow run . --env-manager local
          
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td MLProject/mlruns/0/* | head -n 1 | cut -d'/' -f3)
          echo "Latest MLflow run_id: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: echo "Dependencies sudah terinstall di tahap sebelumnya"

      - name: Upload to GitHub
        run: |
          git config --global user.name ${{ secrets.USERNAME_GITHUB }}
          git config --global user.email ${{ secrets.EMAIL_GITHUB }}
          git pull
          git add -f MLProject/mlruns/
          git commit -m "mlruns update: $RUN_ID" || True
          git push origin main


      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "mobile_price_cls-api"

      - name: Tag Docker Image
        run: |
          docker tag mobile_price_cls-api ${{ secrets.DOCKER_USERNAME }}/mobile_price_cls-api:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mobile_price_cls-api:latest