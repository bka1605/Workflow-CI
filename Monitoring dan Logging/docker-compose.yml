version: '3.8'

services:
  api:
    build: .
    container_name: mobile_price_cls-api
    image: mobile_price_cls-api
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
